<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="greeting-container">
            <h1 id="opener">Hello User!</h1>
            <p id="message">Welcome to the program.</p>
        </div>
        <div class="todo-container">
            <h2>To Do List:</h2>
            <ol id="todoList">
            </ol>
        </div>
        <div class="form-container">
            <div class="user-form">
                <label for="todo">Enter a new Task: </label>
                <input type="text" id="todo" placeholder="New task">
                <button onclick="addTodo()">Add to list</button>
            </div>
            <div class="user-form">
                <label for="name">Enter your name: </label>
                <input type="text" id="name" placeholder="Name">
            </div>
            <div class="user-form">
                <label for="greeting">Enter a new greeting: </label>
                <input type="text" id="greeting" placeholder="Greeting">
            </div>
            <select name="background" id="background">
                <option value="pink">Pink</option>
                <option value="orange">Orange</option>
                <option value="blue">Blue</option>
            </select>
            <button id="updateButton">Update Page</button>
        </div>

    </main>
    <script src="script.js"></script>
</body>

</html>
